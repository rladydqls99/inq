x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: api
    environment:
      DATABASE_URL: file:/data/inq.db
      NODE_ENV: production
      PIN_SESSION_TTL_SECONDS: ${PIN_SESSION_TTL_SECONDS:-86400}
      PIN_MAX_ATTEMPTS: ${PIN_MAX_ATTEMPTS:-10}
      PIN_LOCKOUT_SECONDS: ${PIN_LOCKOUT_SECONDS:-300}
      INITIAL_PIN: ${INITIAL_PIN:?INITIAL_PIN must be set}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
    volumes:
      - inq-sqlite:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.inq.rule=Host(`${DOMAIN:?DOMAIN must be set}`)
      - traefik.http.routers.inq.entrypoints=websecure
      - traefik.http.routers.inq.tls=true
      - traefik.http.routers.inq.tls.certresolver=letsencrypt
      - traefik.http.services.inq.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

volumes:
  inq-sqlite:
