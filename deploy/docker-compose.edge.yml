services:
  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set}
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
